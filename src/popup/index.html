<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studocu Cleaner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app" aria-label="Studocu Cleaner">
    <header class="topbar">
      <div class="brand" aria-label="Studocu Cleaner">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" focusable="false">
            <path d="M18.8 3.2c.3.1.5.4.4.8l-1.2 4.7c-.1.3 0 .6.2.8s.4.4.7.4c1.7.2 3.2 1.1 4.2 2.4 1.1 1.3 1.6 3 1.5 4.7-.1 1.9-1 3.6-2.4 4.9-1.4 1.3-3.2 2-5.1 2h-7.2c-.3 0-.5-.1-.7-.4-.2-.2-.2-.5-.2-.8l1.2-4.7c.1-.3 0-.6-.2-.8s-.4-.4-.7-.4c-1.7-.2-3.2-1.1-4.2-2.4C4 13.1 3.5 11.4 3.6 9.7c.1-1.9 1-3.6 2.4-4.9 1.4-1.3 3.2-2 5.1-2h7.2c.2 0 .4.1.5.4Zm-4.7 6.9H8.9c-.3 0-.5.1-.7.4-.2.2-.2.5-.2.8l1.4 5.4c.1.4.5.7.9.7h5.2c.3 0 .5-.1.7-.4.2-.2.2-.5.2-.8L15 10.8c-.1-.4-.5-.7-.9-.7Z"/>
          </svg>
        </span>
        <span class="brand-copy">
          <span class="brand-title">Studocu Cleaner</span>
          <span class="brand-meta" data-i18n="brandMeta">PDF & dọn dẹp</span>
        </span>
      </div>
      <span class="version" id="version-badge" aria-label="Phiên bản">v-</span>
    </header>

    <div id="tab-indicator" class="tab-indicator is-checking" role="status" aria-live="polite">
      <span class="tab-indicator-dot" aria-hidden="true"></span>
      <span id="tab-indicator-text" data-i18n="tabStatusChecking">Đang kiểm tra tab...</span>
    </div>

    <main class="main">
      <section class="panel" aria-labelledby="actions-title">
        <div class="section-head">
          <h1 id="actions-title" data-i18n="actionsTitle">Thao tác</h1>
          <span class="section-count" data-i18n="actionsCount">2 công cụ</span>
        </div>

        <div class="actions">
          <button id="btn-pdf" type="button" class="action action-pdf">
            <span class="action-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <path d="M14 2v6h6"/>
                <path d="M8 13h8"/>
                <path d="M8 17h5"/>
              </svg>
            </span>
            <span class="action-copy">
              <span class="action-title" data-i18n="pdfTitle">Xuất PDF</span>
              <span class="action-desc" data-i18n="pdfDesc">Tạo bản in sạch từ trang đã tải</span>
            </span>
            <span class="action-trail" aria-hidden="true">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </span>
          </button>

          <button id="btn-bypass" type="button" class="action action-clean">
            <span class="action-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12h6"/>
              </svg>
            </span>
            <span class="action-copy">
              <span class="action-title" data-i18n="bypassTitle">Bypass mờ</span>
              <span class="action-desc" data-i18n="bypassDesc">Xoá cookie, storage và reload tab</span>
            </span>
            <span class="action-trail" aria-hidden="true">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </span>
          </button>
        </div>
      </section>

      <section class="settings" aria-labelledby="language-title">
        <span id="language-title" class="settings-label" data-i18n="languageLabel">Ngôn ngữ</span>
        <div class="language-toggle" role="group" aria-labelledby="language-title" data-active="vi">
          <span class="language-slider" aria-hidden="true"></span>
          <button type="button" class="language-option" data-lang-option="vi" aria-pressed="true">VI</button>
          <button type="button" class="language-option" data-lang-option="en" aria-pressed="false">EN</button>
        </div>
      </section>

      <div id="status" class="status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text" data-i18n="statusReady">Sẵn sàng</span>
      </div>
    </main>

    <footer class="footer">
      <a class="author" href="https://github.com/trunghieupham59" target="_blank" rel="noopener noreferrer">
        trunghieupham59
      </a>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
