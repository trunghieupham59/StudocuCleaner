<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studocu Tools</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="app">

    <!-- ── Header ─────────────────────────────────────── -->

      <div class="header-inner">
        <div class="header-brand">
          <div class="brand-icon">

              <title>Studocu logo</title>

            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">Studocu Tools</span>
            <span class="brand-sub">Mở khóa tài liệu học tập</span>
          </div>
        </div>
        <span class="badge" id="version-badge">v—</span>
      </div>
    </header>

    <!-- ── Main ───────────────────────────────────────── -->
    <main class="main">

      <p class="section-label">Thao tác</p>

      <div class="action-list">

        <!-- PDF -->
        <button id="btn-pdf" type="button" class="action-item action-pdf">
          <div class="action-icon">
            <!-- File PDF icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="PDF icon">
              <title>PDF icon</title>
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <div class="action-body">
            <span class="action-title">Xuất file PDF</span>
            <span class="action-desc">In tài liệu không có watermark</span>
          </div>
          <div class="action-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </button>

        <!-- Bypass -->
        <button id="btn-bypass" type="button" class="action-item action-clear">
          <div class="action-icon">
            <!-- Shield-off / unlock icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Bypass icon">
              <title>Bypass icon</title>
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <line x1="9" y1="12" x2="15" y2="12"/>
            </svg>
          </div>
          <div class="action-body">
            <span class="action-title">Bypass mờ &amp; watermark</span>
            <span class="action-desc">Xóa cookie và tải lại trang</span>
          </div>
          <div class="action-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </button>

      </div>

      <!-- Status -->
      <div id="status" class="status" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text">Sẵn sàng hoạt động</span>
      </div>

    </main>

    <!-- ── Footer ─────────────────────────────────────── -->
    <footer class="footer">
      Made with <span class="heart" aria-hidden="true">♥</span> by
      <a class="author" href="https://github.com/trunghieupham59" target="_blank" rel="noopener noreferrer">
        trunghieupham59
      </a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
