<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="app">

    <!-- Header -->

      <div class="header-brand">

          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Studocu</span>
          <span class="brand-tag">Tools</span>
        </div>
      </div>
      <span class="badge">v1.1</span>
    </header>

    <!-- Body -->
    <main class="main">

      <!-- Section label -->
      <p class="section-label">CHỌN THAO TÁC</p>

      <!-- Action list -->
      <div class="action-list">

        <!-- PDF button -->
        <button id="checkBtn" type="button" class="action-item action-pdf">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Download icon" role="img">
              <title>Download icon</title>
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="action-body">
            <span class="action-title">Tạo file PDF</span>
            <span class="action-desc">In tài liệu không watermark</span>
          </div>
          <div class="action-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Arrow icon" role="img">
              <title>Arrow icon</title>
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </button>

        <div class="divider"></div>

        <!-- Clear cookies button -->
        <button id="clearBtn" type="button" class="action-item action-clear">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Trash icon" role="img">
              <title>Trash icon</title>
              <path d="M3 6h18"/>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
              <line x1="10" y1="11" x2="10" y2="17"/>
              <line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          </div>
          <div class="action-body">
            <span class="action-title">Bypass mờ &amp; watermark</span>
            <span class="action-desc">Xóa cookie và tải lại trang</span>
          </div>
          <div class="action-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Arrow icon" role="img">
              <title>Arrow icon</title>
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </button>

      </div>

      <!-- Status bar -->
      <div id="status" class="status">
        <span class="status-dot"></span>
        <span id="status-text">Sẵn sàng hoạt động</span>
      </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      Made with <span class="heart">♥</span> by
      <a class="author" href="https://github.com/trunghieupham59" target="_blank" rel="noopener noreferrer">lelotus</a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
